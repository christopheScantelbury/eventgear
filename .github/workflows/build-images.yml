name: Build API (GHCR + Railway) + Deploy Web (Vercel)

# API: build Docker → push GHCR → Railway redeploy
# Web: Vercel gerencia o build e deploy automaticamente via GitHub integration.
#      O job deploy-vercel abaixo serve apenas de fallback/trigger manual.
#
# Tags geradas para API:
#   ghcr.io/<owner>/eventgear/api:latest
#   ghcr.io/<owner>/eventgear/api:<sha>
#
# Secrets necessários no repositório:
#   RAILWAY_TOKEN            — account token Railway
#   RAILWAY_ENV_ID           — id do environment de produção
#   RAILWAY_API_SERVICE_ID   — id do serviço api
#   VERCEL_TOKEN             — token da conta Vercel
#   VERCEL_PROJECT_ID        — id do projeto eventgear-web no Vercel

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-images.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  # ── API — Docker → GHCR → Railway ──────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    # Roda apenas quando arquivos da API ou packages mudam
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added), 'apps/api') ||
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added), 'packages') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/eventgear/api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push (API)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/eventgear/api:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/eventgear/api:buildcache,mode=max

  # ── Deploy Railway API ──────────────────────────────────────────────
  deploy-railway-api:
    name: Trigger Railway API redeploy
    runs-on: ubuntu-latest
    needs: build-api
    if: needs.build-api.result == 'success'

    steps:
      - name: Redeploy API (Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENV_ID: ${{ secrets.RAILWAY_ENV_ID }}
          SERVICE_ID: ${{ secrets.RAILWAY_API_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$SERVICE_ID" ]; then
            echo "Railway secrets não configurados — skipping"
            exit 0
          fi
          curl -f -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation R(\$s:String!,\$e:String!){serviceInstanceRedeploy(serviceId:\$s,environmentId:\$e)}\",\"variables\":{\"s\":\"$SERVICE_ID\",\"e\":\"$ENV_ID\"}}" \
            | tee /tmp/r.json
          grep -q '"data"' /tmp/r.json && echo "✅ API redeploy disparado" || (echo "❌ Erro" && exit 1)

  # ── Web — Vercel (trigger manual/fallback) ──────────────────────────
  # A Vercel já escuta push no master via GitHub integration e faz deploy
  # automático. Este job serve como trigger explícito via API para garantir
  # que o deploy aconteça mesmo se a integração automática falhar.
  deploy-vercel:
    name: Trigger Vercel deploy (web)
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added), 'apps/web') ||
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added), 'packages') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$PROJECT_ID" ]; then
            echo "Vercel secrets não configurados — skipping (integração automática cuida do deploy)"
            exit 0
          fi
          curl -f -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"eventgear-web\",
              \"project\": \"$PROJECT_ID\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": 1232302708,
                \"ref\": \"${{ github.ref_name }}\"
              },
              \"target\": \"production\"
            }" | grep -oE '"(id|url|readyState)":\s*"[^"]*"' | head -5
          echo "✅ Vercel deploy disparado"

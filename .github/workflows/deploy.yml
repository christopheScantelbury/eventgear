name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Testes — gate obrigatorio antes de qualquer deploy ─────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx --prefix ../.. prisma generate

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-min!!
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: eventgear
          NODE_ENV: test
        run: npx vitest run

  # ── 2. Deploy API ─────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Trigger rebuild (API)
        run: |
          curl -f -X POST "${{ secrets.EASYPANEL_API_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Wait for build + boot
        run: sleep 360

      - name: Health check API
        timeout-minutes: 10
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.API_HEALTH_URL }}/v1/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API deploy OK"
              exit 0
            fi
            sleep 30
          done
          echo "API health check failed after ~10min"
          exit 1

  # ── 3. Deploy Web ─────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Trigger rebuild (Web)
        run: |
          curl -f -X POST "${{ secrets.EASYPANEL_WEB_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Wait for build + boot
        run: sleep 420

      - name: Health check Web
        timeout-minutes: 10
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.WEB_HEALTH_URL }}" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "Web deploy OK"
              exit 0
            fi
            sleep 30
          done
          echo "Web health check failed after ~10min"
          exit 1

  # ── 4. Notificacao final ──────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: always()

    steps:
      - name: Summary
        run: |
          API_STATUS="${{ needs.deploy-api.result }}"
          WEB_STATUS="${{ needs.deploy-web.result }}"
          echo "API deploy: $API_STATUS"
          echo "Web deploy: $WEB_STATUS"
          if [ "$API_STATUS" = "success" ] && [ "$WEB_STATUS" = "success" ]; then
            echo "All services deployed successfully"
          else
            echo "One or more deploys failed"
            exit 1
          fi

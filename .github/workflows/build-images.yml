name: Build Images (GHCR) + Deploy Railway

# Builda as imagens Docker no runner do GitHub e empurra para o GHCR público.
# O Railway puxa a imagem via deploy hook — sem build na infra de produção.
#
# Tags geradas:
#   ghcr.io/<owner>/eventgear/api:latest
#   ghcr.io/<owner>/eventgear/api:<sha>
#   ghcr.io/<owner>/eventgear/web:latest
#   ghcr.io/<owner>/eventgear/web:<sha>
#
# Secrets necessários no repositório:
#   RAILWAY_API_DEPLOY_HOOK  — URL do webhook Railway → serviço API
#   RAILWAY_WEB_DEPLOY_HOOK  — URL do webhook Railway → serviço Web
#   NEXT_PUBLIC_API_URL      — URL pública da API (build-time Next.js)

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-images.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  OWNER_LC: ${{ github.repository_owner }}

jobs:
  # ── API ────────────────────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/eventgear/api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push (API)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ── Web ────────────────────────────────────────────────────────────
  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/eventgear/web
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push (Web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          # NEXT_PUBLIC_* precisa estar disponível em build time
          # URLs do Railway são públicas (não são secrets)
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-production-6757.up.railway.app/v1
            NEXT_PUBLIC_APP_URL=https://web-production-d5d96.up.railway.app
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Deploy Railway — força pull da nova imagem via GraphQL ─────────
  # Usa serviceInstanceRedeploy direto (Railway não expõe deployHookCreate
  # na API GraphQL pública, então fazemos a mutation manualmente).
  deploy-railway:
    name: Trigger Railway redeploy
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: always() && (needs.build-api.result == 'success' || needs.build-web.result == 'success')

    steps:
      - name: Redeploy API (Railway)
        if: needs.build-api.result == 'success'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENV_ID: ${{ secrets.RAILWAY_ENV_ID }}
          SERVICE_ID: ${{ secrets.RAILWAY_API_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$SERVICE_ID" ]; then
            echo "Railway secrets não configurados — skipping"
            exit 0
          fi
          curl -f -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation R(\$s:String!,\$e:String!){serviceInstanceRedeploy(serviceId:\$s,environmentId:\$e)}\",\"variables\":{\"s\":\"$SERVICE_ID\",\"e\":\"$ENV_ID\"}}" \
            | tee /tmp/r.json
          grep -q '"data"' /tmp/r.json && echo "✅ API redeploy disparado" || (echo "❌ Erro" && exit 1)

      - name: Redeploy Web (Railway)
        if: needs.build-web.result == 'success'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENV_ID: ${{ secrets.RAILWAY_ENV_ID }}
          SERVICE_ID: ${{ secrets.RAILWAY_WEB_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$SERVICE_ID" ]; then
            echo "Railway secrets não configurados — skipping"
            exit 0
          fi
          curl -f -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation R(\$s:String!,\$e:String!){serviceInstanceRedeploy(serviceId:\$s,environmentId:\$e)}\",\"variables\":{\"s\":\"$SERVICE_ID\",\"e\":\"$ENV_ID\"}}" \
            | tee /tmp/r.json
          grep -q '"data"' /tmp/r.json && echo "✅ Web redeploy disparado" || (echo "❌ Erro" && exit 1)

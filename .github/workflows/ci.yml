name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx --prefix ../.. prisma generate

      - name: Type check
        working-directory: apps/api
        run: npx --prefix ../.. tsc --noEmit

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npm rebuild bcrypt || true

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx --prefix ../.. prisma generate

      - name: Run unit tests with coverage
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-min!!
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: eventgear
          NODE_ENV: test
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 14

      - name: Coverage summary (PR comment)
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          working-directory: apps/api

  build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (sem push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: eventgear-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

version: '3.9'

services:
  # ── Banco de Dados ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eventgear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventgear
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventgear_dev}
      POSTGRES_DB: eventgear
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eventgear']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Filas ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eventgear-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-redis_dev}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Storage de Arquivos ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: eventgear-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'   # API S3
      - '9001:9001'   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (NestJS) — apenas em produção/staging local ─────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: eventgear-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://eventgear:${POSTGRES_PASSWORD:-eventgear_dev}@postgres:5432/eventgear
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379
      MINIO_ENDPOINT: minio
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - full

  # ── Frontend (Next.js) — apenas em produção/staging local ───────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: eventgear-web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/v1
    ports:
      - '3000:3000'
    depends_on:
      - api
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  minio_data:

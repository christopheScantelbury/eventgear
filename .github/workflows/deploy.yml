name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Testes antes de qualquer deploy ────────────────────────────────────
  test:
    name: Tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - run: npm rebuild bcrypt || true

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx --prefix ../.. prisma generate

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-min!!
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: eventgear
          NODE_ENV: test
        run: npx vitest run

  # ── 2. Deploy API no Easypanel (rebuild do GitHub) ────────────────────────
  deploy-api:
    name: Deploy API → Easypanel
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Trigger Easypanel rebuild (API)
        run: |
          curl -f -X POST "${{ secrets.EASYPANEL_API_WEBHOOK }}" \
            -H "Content-Type: application/json"

      - name: Health check pós-deploy
        run: |
          echo "Aguardando build + boot..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.API_HEALTH_URL }}/v1/health" || echo "000")
            echo "Tentativa $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 15
          done
          echo "❌ Health check falhou após 150s" && exit 1

      - name: Notify success
        if: success()
        run: echo "✅ API deployada com sucesso"

  # ── 3. Deploy Web no Easypanel ────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Easypanel
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Trigger Easypanel rebuild (Web)
        run: |
          curl -f -X POST "${{ secrets.EASYPANEL_WEB_WEBHOOK }}" \
            -H "Content-Type: application/json"

      - name: Notify success
        if: success()
        run: echo "✅ Web deployada com sucesso"

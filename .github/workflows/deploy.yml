name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/eventgear-api

jobs:
  # ── 1. Testes antes de qualquer deploy ────────────────────────────────────
  test:
    name: Tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - run: npm rebuild bcrypt || true

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx --prefix ../.. prisma generate

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-min!!
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: eventgear
          NODE_ENV: test
        run: npx vitest run

  # ── 2. Build e push da imagem Docker ──────────────────────────────────────
  build-and-push:
    name: Build & Push API image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy no Easypanel via webhook ────────────────────────────────────
  deploy:
    name: Deploy to Easypanel
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Trigger Easypanel deploy (API)
        run: |
          curl -f -X POST "${{ secrets.EASYPANEL_API_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": "${{ env.API_IMAGE }}:latest"
            }'

      - name: Health check pós-deploy
        run: |
          sleep 20
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_HEALTH_URL }}/v1/health" || echo "000")
            echo "Tentativa $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "Health check falhou após 60s" && exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deploy concluído — ${{ env.API_IMAGE }}:sha-${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy falhou — verifique os logs do Easypanel"
          exit 1

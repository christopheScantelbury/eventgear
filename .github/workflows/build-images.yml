name: Build Images (GHCR) + Deploy Railway

# Builda as imagens Docker no runner do GitHub e empurra para o GHCR público.
# O Railway puxa a imagem via deploy hook — sem build na infra de produção.
#
# Tags geradas:
#   ghcr.io/<owner>/eventgear/api:latest
#   ghcr.io/<owner>/eventgear/api:<sha>
#   ghcr.io/<owner>/eventgear/web:latest
#   ghcr.io/<owner>/eventgear/web:<sha>
#
# Secrets necessários no repositório:
#   RAILWAY_API_DEPLOY_HOOK  — URL do webhook Railway → serviço API
#   RAILWAY_WEB_DEPLOY_HOOK  — URL do webhook Railway → serviço Web
#   NEXT_PUBLIC_API_URL      — URL pública da API (build-time Next.js)

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-images.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  OWNER_LC: ${{ github.repository_owner }}

jobs:
  # ── API ────────────────────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/eventgear/api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push (API)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ── Web ────────────────────────────────────────────────────────────
  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/eventgear/web
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push (Web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          # NEXT_PUBLIC_* precisa estar disponível em build time
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Deploy Railway — notifica cada serviço para puxar a nova imagem ─
  deploy-railway:
    name: Trigger Railway redeploy
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: always() && (needs.build-api.result == 'success' || needs.build-web.result == 'success')

    steps:
      - name: Redeploy API (Railway)
        if: needs.build-api.result == 'success'
        run: |
          if [ -n "${{ secrets.RAILWAY_API_DEPLOY_HOOK }}" ]; then
            curl -f -X POST "${{ secrets.RAILWAY_API_DEPLOY_HOOK }}" \
              || echo "Railway API deploy hook falhou (non-fatal)"
          else
            echo "RAILWAY_API_DEPLOY_HOOK não configurado — skipping"
          fi

      - name: Redeploy Web (Railway)
        if: needs.build-web.result == 'success'
        run: |
          if [ -n "${{ secrets.RAILWAY_WEB_DEPLOY_HOOK }}" ]; then
            curl -f -X POST "${{ secrets.RAILWAY_WEB_DEPLOY_HOOK }}" \
              || echo "Railway Web deploy hook falhou (non-fatal)"
          else
            echo "RAILWAY_WEB_DEPLOY_HOOK não configurado — skipping"
          fi

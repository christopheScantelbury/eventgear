name: Deploy (legacy — desativado)

# DESATIVADO em 2026-05-09: substituído por build-images.yml que builda no
# runner do GitHub e empurra a imagem pro GHCR. A VPS pequena não dava
# conta de buildar npm + nest no Easypanel.

on:
  workflow_dispatch: {}

jobs:
  # ── 1. Testes — gate obrigatorio antes de qualquer deploy ─────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx --prefix ../.. prisma generate

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-min!!
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: eventgear
          NODE_ENV: test
        run: npx vitest run

  # ── 2. Deploy API ─────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Trigger rebuild (API)
        run: |
          curl -f -X POST "${{ secrets.EASYPANEL_API_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Wait for new container (poll commit hash)
        timeout-minutes: 15
        run: |
          # Poll until the new commit is being served — no fixed sleep.
          # Tries: ~90 attempts * 10s = ~15 min ceiling.
          # Counts as healthy if commit changes OR if /v1/health returns 200
          # AFTER giving the build at least 60s to start.
          sleep 60
          for i in $(seq 1 90); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.API_HEALTH_URL }}/v1/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API deploy OK"
              exit 0
            fi
            sleep 10
          done
          echo "API health check failed after ~15min"
          exit 1

  # ── 3. Deploy Web ─────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Capture pre-deploy bundle hash
        id: pre
        run: |
          # Try to capture the current page bundle hash so we can confirm the
          # new build is actually live (not just the old container answering).
          HASH=$(curl -sf "${{ secrets.WEB_HEALTH_URL }}" 2>/dev/null \
            | grep -o 'page-[a-f0-9]*\.js' | head -1 || echo "none")
          echo "hash=$HASH"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Trigger rebuild (Web)
        run: |
          curl -f -X POST "${{ secrets.EASYPANEL_WEB_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Wait for new bundle hash
        timeout-minutes: 20
        env:
          PRE_HASH: ${{ steps.pre.outputs.hash }}
        run: |
          # Next.js build is slower than NestJS — give it 2min before polling.
          # If the site was already down before deploy (hash=none), just wait
          # for any 200 response. Otherwise wait for the bundle hash to change.
          echo "Pre-deploy bundle hash: $PRE_HASH"
          sleep 120
          for i in $(seq 1 100); do
            # Fetch the login page HTML
            BODY=$(curl -sf "${{ secrets.WEB_HEALTH_URL }}" 2>/dev/null || echo "")
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.WEB_HEALTH_URL }}" || echo "000")
            NEW_HASH=$(echo "$BODY" | grep -o 'page-[a-f0-9]*\.js' | head -1 || echo "")
            echo "Attempt $i: HTTP $STATUS  hash=$NEW_HASH"
            # Success conditions:
            # 1. Site was down before (hash=none) and now returns 200
            # 2. Bundle hash has changed (confirming new build is live)
            if [ "$PRE_HASH" = "none" ] && [ "$STATUS" = "200" ]; then
              echo "Web deploy OK (site was down, now up)"
              exit 0
            fi
            if [ -n "$NEW_HASH" ] && [ "$NEW_HASH" != "$PRE_HASH" ]; then
              echo "Web deploy OK (new bundle: $NEW_HASH)"
              exit 0
            fi
            sleep 10
          done
          echo "Web health check failed after ~20min"
          exit 1

  # ── 4. Notificacao final ──────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: always()

    steps:
      - name: Summary
        run: |
          API_STATUS="${{ needs.deploy-api.result }}"
          WEB_STATUS="${{ needs.deploy-web.result }}"
          echo "API deploy: $API_STATUS"
          echo "Web deploy: $WEB_STATUS"
          if [ "$API_STATUS" = "success" ] && [ "$WEB_STATUS" = "success" ]; then
            echo "All services deployed successfully"
          else
            echo "One or more deploys failed"
            exit 1
          fi
